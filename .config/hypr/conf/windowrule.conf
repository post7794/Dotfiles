# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Disable blur for floating XWayland window
windowrule = no_blur on, match:class xwayland:1, match:float true

# Floating launcher window
windowrule {
    name = floating-launcher
    match:class = ^ghostty$
    match:title = Application Launcher
    float = true
    size = 50% 50%
    center = true
}

# Pavucontrol popup
windowrule {
    name = pavucontrol-popup
    match:class = ^org\.pulseaudio\.pavucontrol$
    float = true
    size = 500 600
    move = 1400 54
    pin = true
}
